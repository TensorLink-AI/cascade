# Daily publish of the cascade held-out eval pool from the tsbench-forge mirror.
#
# The two-bucket relay (docs/EVAL_POOL.md): the forge scrape host mirrors raw
# data to a PRIVATE forge bucket; this job syncs that down and builds + publishes
# a dated eval-pool snapshot to [storage] pool_bucket. Validators then pull the
# rotating pool by effective_block — no chain.toml edit per round.
#
# TWO KEYS, because the two buckets are owned by different principals and no
# single credential can touch both:
#   * FORGE READ key  — read-only on the forge bucket, used ONLY by the aws s3
#     sync step (secrets.TSFORGE_S3_ACCESS_KEY / _SECRET_KEY).
#   * CASCADE key      — writes the eval-pool bucket and reads the manifest
#     bucket, used by cascade-pool publish (secrets.HIPPIUS_S3_ACCESS_KEY /
#     _SECRET_KEY). Scoped per step so neither key is exposed to the other's API.
#
# REQUIRED repo secrets:
#   TSFORGE_S3_ACCESS_KEY / TSFORGE_S3_SECRET_KEY   read-only forge-bucket key
#   HIPPIUS_S3_ACCESS_KEY / HIPPIUS_S3_SECRET_KEY   cascade eval-pool write key
# OPTIONAL repo variables:
#   TSFORGE_BUCKET        forge raw-data bucket   (default: tsbench-forge-sources)
#   HIPPIUS_S3_ENDPOINT   S3 endpoint             (default: https://s3.hippius.com)
#
# PREREQUISITE: `--effective-block auto` reads the trainer's latest.json from the
# manifest bucket. Until a trainer is publishing manifests, run this manually
# (workflow_dispatch) with an explicit effective_block.
#
# Use ONE publisher only — if another host already publishes to the pool bucket,
# retire it before enabling the schedule (two publishers race on pool/index.json).
name: Publish eval pool

on:
  schedule:
    - cron: "0 3 * * *"          # 03:00 UTC daily — active from the next round
  workflow_dispatch:
    inputs:
      network:
        description: "Which chain config to publish"
        type: choice
        options: [testnet, mainnet]
        default: testnet
      effective_block:
        description: "Explicit effective_block (leave 'auto' once a trainer manifest exists)"
        required: false
        default: "auto"

concurrency:
  group: publish-pool          # never let two publishes race on pool/index.json
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # cascade key — eval-pool WRITE + manifest READ (read by cascade-pool publish)
      HIPPIUS_S3_ACCESS_KEY: ${{ secrets.HIPPIUS_S3_ACCESS_KEY }}
      HIPPIUS_S3_SECRET_KEY: ${{ secrets.HIPPIUS_S3_SECRET_KEY }}
      # forge-bucket config (read key is applied per-step, below)
      TSFORGE_BUCKET: ${{ vars.TSFORGE_BUCKET || 'tsbench-forge-sources' }}
      S3_ENDPOINT: ${{ vars.HIPPIUS_S3_ENDPOINT || 'https://s3.hippius.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cascade (pool-forge + hippius extras)
        run: pip install -e ".[pool-forge,hippius]" awscli

      - name: Sync forge mirror down  (FORGE READ key only)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TSFORGE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TSFORGE_S3_SECRET_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::TSFORGE_S3_ACCESS_KEY not set — cannot read the forge bucket."
            exit 1
          fi
          aws s3 sync "s3://${TSFORGE_BUCKET}" ./tsforge \
            --endpoint-url "$S3_ENDPOINT" --exact-timestamps
          n=$(find ./tsforge/data -name '*.parquet' 2>/dev/null | wc -l)
          newest=$(ls -1 ./tsforge/data/*/*.parquet 2>/dev/null | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | sort -u | tail -1)
          echo "synced $n parquet files; newest partition: ${newest:-none}"
          test "$n" -gt 0 || { echo "::error::forge mirror is empty"; exit 1; }

      - name: Build + publish snapshot  (CASCADE key)
        env:
          NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          EFFECTIVE_BLOCK: ${{ github.event.inputs.effective_block || 'auto' }}
        run: |
          TOML=chain.testnet.toml
          [ "$NETWORK" = "mainnet" ] && TOML=chain.toml
          echo "publishing with $TOML (effective-block=$EFFECTIVE_BLOCK)"
          TSFORGE_DIR=./tsforge cascade-pool publish \
            --chain-toml "$TOML" \
            --sources tsbench_forge \
            --effective-block "$EFFECTIVE_BLOCK"
